<!DOCTYPE html>
<html>
<head>
    <title>vmsgk chat</title>
    <style>
        body {
            font-family: Arial;
            background: #0f0f12;
            color: white;
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            object-fit: contain;
            transform: scale(1);
            z-index: -1;
        }

        #avatar {
            position: fixed;

            left: 38%;
            bottom: -220px;

            width: 450px;
            height: 950px;

            object-fit: cover;
            object-position: top center;

            transform: translateX(-50%) scale(1.2);

            z-index: 0;
            pointer-events: none;
        }

        #desk-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            object-fit: cover;
            z-index: 1;
            pointer-events: none;
        }

        #chat {
            position: fixed;
            right: 71px;
            top: 131px;

            width: 349px;
            height: 526px;

            z-index: 2;

            display: flex;
            flex-direction: column;
        }

        #messages {
            flex: 1;
            overflow-y: auto;

            padding: 8px;

            display: flex;
            flex-direction: column;
            gap: 6px;

            scrollbar-width: none;
        }
        
        #messeges::-webkit-scrollbar {
                display: none;
            }

        .user {
            align-self: flex-end;
            background: #4fc3f7;
            color: black;
            padding: 8px 12px;
            border-radius: 12px 12px 0 12px;
            max-width: 75%;
        }

        .bot {
            align-self: flex-start;
            background: #ff80ab;
            color: black;
            padding: 8px 12px;
            border-radius: 12px 12px 12px 0;
            max-width: 75%;
        }

        #input {
            width: 75%;
            padding: 8px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            background: #f2a2bd;
            color: white;
            cursor: pointer;
        }

    </style>
</head>

<body>
<video autoplay muted loop id="bg-video">
    <source src="static\backgrounds\playroom\playroom.mp4" type="video/mp4">
</video>

<img id="desk-overlay" src="static\overlays\table.png">

<img id="avatar" src="/static/avatar/vmsgk.png">

<div id="chat">
    <div id="messages"></div>

    <div style="display:flex; gap:8px;">
        <input id="input" placeholder="talk to vmsgk..." />
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
async function send() {
    const input = document.getElementById("input");
    const msg = input.value;

    addMessage("You", msg, "user");

    const res = await fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: msg })
    });

    const data = await res.json();

    addMessage("vmsgk", data.reply, "bot");

    input.value = "";
}

function addMessage(sender, text, type) {
    const div = document.createElement("div");
    div.className = type;
    div.innerText = text;
    document.getElementById("messages").appendChild(div);

    document.getElementById("messages").scrollTop =
        document.getElementById("messages").scrollHeight;
}
</script>

</body>
</html>
